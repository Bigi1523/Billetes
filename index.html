<!doctype html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <link rel="manifest" href="manifest.json">
  <style>
    body { margin:0; background:#000; color:#fff; font-family: system-ui; }
    #wrap { position: relative; width:100vw; height:100vh; overflow:hidden; }
    video { width:100%; height:100%; object-fit: cover; }

    /* ROI: más alto y un poco más ancho para incluir bien números + letra */
    #roiBox{
      position:absolute;
      top: 7%;
      right: 5%;
      width: 72%;
      max-width: 420px;
      height: 14%;
      max-height: 110px;
      border: 3px solid rgba(0,255,0,.95);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.30);
      pointer-events:none;
    }

    #hud{
      position:absolute; left:12px; right:12px; bottom:12px;
      background:rgba(0,0,0,.60);
      padding:10px 12px; border-radius:14px;
    }

    button{
      padding:10px 12px; border-radius:12px; border:0;
      font-weight:800;
    }

    #status{
      margin-top:8px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      line-height: 1.25;
    }

    #row { display:flex; gap:10px; align-items:center; }
    #pill{
      display:inline-block; padding:6px 10px; border-radius:999px;
      background: rgba(255,255,255,.10);
      font-size: 12px;
    }
  </style>
</head>

<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="roiBox"></div>

  <div id="hud">
    <div id="row">
      <button id="startBtn">Iniciar cámara</button>
      <span id="pill">OCR: 600ms</span>
    </div>
    <div id="status">Listo.</div>
  </div>
</div>

<script type="module">
  import { createWorker } from "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js";

  const video = document.getElementById("video");
  const roiBox = document.getElementById("roiBox");
  const statusEl = document.getElementById("status");
  const startBtn = document.getElementById("startBtn");
  const pill = document.getElementById("pill");

  // PWA offline
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

  // Carga rangos
  let rangesData = {};
  try {
    rangesData = await fetch("ranges.json").then(r => r.json());
  } catch (e) {
    statusEl.textContent = "No pude cargar ranges.json";
  }

  function sortRanges() {
    for (const k of Object.keys(rangesData)) {
      rangesData[k] = (rangesData[k] || []).slice().sort((a,b) => a.start - b.start);
    }
  }
  sortRanges();

  function inRanges(letter, number) {
    const list = rangesData[letter];
    if (!list || !list.length) return false;
    let lo = 0, hi = list.length - 1;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      const r = list[mid];
      if (number < r.start) hi = mid - 1;
      else if (number > r.end) lo = mid + 1;
      else return true;
    }
    return false;
  }

  // Extrae 9 dígitos + letra (espacio opcional)
  function extractSerial(text) {
    const t = text
      .toUpperCase()
      .replace(/[^\dA-Z ]/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    const m = t.match(/(\d{9})\s*([A-Z])/);
    if (!m) return null;
    return { numberStr: m[1], letter: m[2], cleaned: t };
  }

  // Canvas de frame + crop
  const frameCanvas = document.createElement("canvas");
  const frameCtx = frameCanvas.getContext("2d", { willReadFrequently: true });

  const cropCanvas = document.createElement("canvas");
  const cropCtx = cropCanvas.getContext("2d", { willReadFrequently: true });

  // Preprocesado: gris + contraste + umbral MÁS BAJO (mejor para tinta gris)
  function preprocessToBW(imgData) {
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      let y = (r*0.299 + g*0.587 + b*0.114);     // gris
      y = (y - 128) * 1.35 + 128;                // contraste
      const v = y > 140 ? 255 : 0;               // umbral (antes 160)
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 255;
    }
    return imgData;
  }

  // OCR worker
  const worker = await createWorker("eng");
  await worker.setParameters({
    tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
  });

  let stream = null;
  let running = false;
  let busy = false;
  let freezeUntil = 0;

  // Ajuste OCR interval (ms)
  let OCR_INTERVAL = 600;
  pill.textContent = `OCR: ${OCR_INTERVAL}ms`;

  // Intentar enfoque continuo si se puede
  async function tryContinuousFocus(track) {
    try {
      const caps = track.getCapabilities?.();
      if (!caps) return;

      // Algunos navegadores usan "focusMode"
      if (caps.focusMode && caps.focusMode.includes("continuous")) {
        await track.applyConstraints({ advanced: [{ focusMode: "continuous" }] });
      }

      // “zoom” no siempre disponible; lo dejamos sin tocar
    } catch (_) {}
  }

  startBtn.onclick = async () => {
    if (running) return;

    statusEl.textContent = "Pidiendo permiso de cámara…";

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: "environment",
        width: { ideal: 1920 },
        height: { ideal: 1080 }
      },
      audio: false
    });

    video.srcObject = stream;
    await video.play();

    const track = stream.getVideoTracks()[0];
    if (track) await tryContinuousFocus(track);

    running = true;
    statusEl.textContent = "Cámara activa. Alinea SOLO el serial dentro del rectángulo.";
    loop();
  };

  async function loop() {
    if (!running) return;

    setTimeout(loop, OCR_INTERVAL);

    // Si congelamos por match, no procesar
    if (Date.now() < freezeUntil) return;
    if (busy) return;
    if (video.videoWidth === 0) return;

    busy = true;
    try {
      // Dibuja frame completo
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video, 0, 0);

      // ROI: coordenadas del overlay -> coordenadas del video
      const vb = video.getBoundingClientRect();
      const rb = roiBox.getBoundingClientRect();
      const scaleX = video.videoWidth / vb.width;
      const scaleY = video.videoHeight / vb.height;

      let x = Math.floor((rb.left - vb.left) * scaleX);
      let y = Math.floor((rb.top - vb.top) * scaleY);
      let w = Math.floor(rb.width * scaleX);
      let h = Math.floor(rb.height * scaleY);

      // Clamp
      x = Math.max(0, Math.min(x, video.videoWidth - 1));
      y = Math.max(0, Math.min(y, video.videoHeight - 1));
      w = Math.max(1, Math.min(w, video.videoWidth - x));
      h = Math.max(1, Math.min(h, video.videoHeight - y));

      // Crop
      const crop = frameCtx.getImageData(x, y, w, h);

      // Preprocesado B/N
      const bw = preprocessToBW(crop);

      // Render en cropCanvas
      cropCanvas.width = w;
      cropCanvas.height = h;
      cropCtx.putImageData(bw, 0, 0);

      // OCR
      const { data } = await worker.recognize(cropCanvas);
      const rawText = (data?.text ?? "").toUpperCase();

      const serial = extractSerial(rawText);

      if (!serial) {
        statusEl.textContent = `No detectado.\nOCR: ${(rawText || "").trim()}`;
        return;
      }

      // Regla: solo letra B
      if (serial.letter !== "B") {
        statusEl.textContent = `Detectado: ${serial.numberStr} ${serial.letter} → descartado (no es B)\nOCR: ${serial.cleaned}`;
        return;
      }

      const n = Number(serial.numberStr);
      const ok = inRanges("B", n);

      if (ok) {
        statusEl.textContent = `✅ ${serial.numberStr} B  (EN RANGO)\nOCR: ${serial.cleaned}`;
        if (navigator.vibrate) navigator.vibrate(200);
        freezeUntil = Date.now() + 1500; // pausa 1.5s para evitar repetición
      } else {
        statusEl.textContent = `❌ ${serial.numberStr} B  (fuera de rango)\nOCR: ${serial.cleaned}`;
      }

    } finally {
      busy = false;
    }
  }
</script>
</body>
</html>
