<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Billetes - Serial Scanner</title>

<style>
  :root{
    --green:#19ff5a;
    --red:#ff3b30;
    --panel: rgba(0,0,0,.62);
  }
  body{ margin:0; background:#000; color:#fff; font-family:system-ui; overflow:hidden; }
  #wrap{ position:relative; width:100vw; height:100vh; }

  video{
    width:100%; height:100%;
    object-fit:cover;
    background:#000;
    display:none;
  }

  /* Marco ROI */
  #roi{
    position:absolute;
    top:18%;
    right:5%;
    width:78%;
    height:16%;
    border:4px solid var(--green);
    border-radius:18px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.32);
    pointer-events:none;
    display:none;
  }

  /* Serial debajo del marco */
  #serial{
    position:absolute;
    top:calc(18% + 16% + 14px);
    right:5%;
    width:78%;
    text-align:center;
    font-size:22px;
    font-weight:900;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    display:none;
    text-shadow: 0 2px 10px rgba(0,0,0,.7);
  }

  /* Resultado central */
  #result{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:160px;
    font-weight:900;
    display:none;
    text-shadow: 0 8px 18px rgba(0,0,0,.6);
    user-select:none;
    pointer-events:none;
    opacity:.92;
  }
  .ok{ color:var(--green); } /* ✓ */
  .bad{ color:var(--red); }  /* X */

  /* Pantalla inicio */
  .screen{
    position:absolute;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:22px;
    background:#000;
  }
  .hidden{ display:none !important; }
  .title{ font-size:22px; font-weight:900; text-align:center; opacity:.95; }

  button{
    border:none;
    border-radius:20px;
    font-weight:900;
    padding:16px 22px;
    font-size:18px;
  }
  .btnGreen{ background:var(--green); color:#000; }
  .btnRed{ background:var(--red); color:#fff; }
  .btnDark{ background:rgba(255,255,255,.10); color:#fff; }

  .btnBig{
    width:min(440px, 92vw);
    padding:18px 22px;
    font-size:22px;
  }

  /* Selector corte (pantalla inicio) */
  .cuts{
    display:flex;
    gap:12px;
    width:min(440px, 92vw);
    justify-content:center;
  }
  .cutBtn{
    flex:1;
    background:rgba(255,255,255,.08);
    color:#fff;
    border:2px solid rgba(255,255,255,.14);
    padding:14px 0;
    border-radius:18px;
    font-size:20px;
    font-weight:900;
  }
  .cutBtn.active{
    border-color: var(--green);
    box-shadow: 0 0 0 3px rgba(25,255,90,.18) inset;
  }

  /* Barra superior en modo cámara */
  #topBar{
    position:absolute;
    left:12px;
    right:12px;
    top:12px;
    display:none;
    gap:10px;
    align-items:center;
    justify-content:space-between;
    pointer-events:auto;
  }
  #leftGroup{
    display:flex;
    gap:10px;
    align-items:center;
  }
  #chip{
    background: var(--panel);
    padding:10px 12px;
    border-radius:16px;
    font-weight:900;
    font-size:14px;
    white-space:nowrap;
  }
  #cutsCam{
    display:flex;
    gap:8px;
    background: var(--panel);
    padding:8px;
    border-radius:18px;
  }
  .cutMini{
    background: rgba(255,255,255,.10);
    border:2px solid rgba(255,255,255,.10);
    color:#fff;
    border-radius:14px;
    padding:8px 12px;
    font-size:16px;
    font-weight:900;
  }
  .cutMini.active{ border-color: var(--green); }

  #rightGroup{
    display:flex;
    gap:10px;
    align-items:center;
  }

  #status{
    position:absolute;
    left:12px; right:12px;
    bottom:8px;
    font-size:12px;
    opacity:.78;
    white-space:pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>

<body>
<div id="wrap">
  <video id="video" playsinline muted></video>

  <div id="roi"></div>
  <div id="serial">—</div>
  <div id="result"></div>

  <div id="topBar">
    <div id="leftGroup">
      <div id="chip">Corte: —</div>
      <div id="cutsCam">
        <button class="cutMini" data-cut="10">10</button>
        <button class="cutMini" data-cut="20">20</button>
        <button class="cutMini" data-cut="50">50</button>
      </div>
    </div>

    <div id="rightGroup">
      <button id="newBtn" class="btnDark">NUEVO ESCANEO</button>
      <button id="powerBtn" class="btnRed">APAGAR CÁMARA</button>
    </div>
  </div>

  <div id="status"></div>

  <!-- Pantalla inicial -->
  <div id="screenStart" class="screen">
    <div class="title">Elige el corte del billete</div>
    <div class="cuts" id="cutsStart">
      <button class="cutBtn" data-cut="10">10</button>
      <button class="cutBtn" data-cut="20">20</button>
      <button class="cutBtn" data-cut="50">50</button>
    </div>
    <button id="startBtn" class="btnBig btnGreen" disabled>INICIAR CÁMARA</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  // ---------- UI ----------
  const video = document.getElementById("video");
  const roi = document.getElementById("roi");
  const serialLabel = document.getElementById("serial");
  const result = document.getElementById("result");
  const statusEl = document.getElementById("status");
  const topBar = document.getElementById("topBar");
  const chip = document.getElementById("chip");

  const screenStart = document.getElementById("screenStart");
  const startBtn = document.getElementById("startBtn");
  const newBtn = document.getElementById("newBtn");
  const powerBtn = document.getElementById("powerBtn");

  video.autoplay = true;
  video.muted = true;
  video.setAttribute("playsinline","");

  // ---------- Estado ----------
  let selectedCut = null; // "10" | "20" | "50"
  let rangesData = {};
  let worker = null;
  let stream = null;
  let running = false;
  let busy = false;

  // OCR timing
  const OCR_INTERVAL = 450;

  // Confirmación: 3 lecturas seguidas iguales
  let pendingCandidate = null;
  let pendingCount = 0;
  const NEED_SAME = 3;

  // Persistencia del resultado
  let displayedCandidate = null;

  function resetPending(){
    pendingCandidate = null;
    pendingCount = 0;
  }

  function feedCandidate(candidate){
    if(candidate === pendingCandidate) pendingCount++;
    else { pendingCandidate = candidate; pendingCount = 1; }
    return pendingCount >= NEED_SAME;
  }

  // ---------- Cargar rangos ----------
  async function loadRanges(){
    try{
      rangesData = await fetch("ranges.json?v=" + Date.now(), { cache:"no-store" }).then(r=>r.json());
      statusEl.textContent = "Rangos cargados. Elige corte e inicia cámara.";
    }catch(e){
      statusEl.textContent = "❌ No pude cargar ranges.json.\n" + (e?.message || e);
    }
  }
  loadRanges();

  // ---------- Rangos: corte -> "B" -> lista ----------
  function inRangesForCut_B(cut, num){
    const list = rangesData?.[cut]?.["B"];
    if(!list) return false;
    for(const r of list){
      if(num >= r.start && num <= r.end) return true;
    }
    return false;
  }

  // ---------- Extractor: 9 dígitos + B ----------
  function extract(text){
    const t = (text || "").toUpperCase()
      .replace(/[^\dA-Z]/g, " ")
      .replace(/\s+/g, " ")
      .trim();

    const m = t.match(/(?:^|\s)(\d{9})\s*B(?:\s|$)/);
    if(!m) return null;
    return { num: m[1], letter: "B" };
  }

  // ---------- Canvas + preprocesado ----------
  const frameCanvas = document.createElement("canvas");
  const frameCtx = frameCanvas.getContext("2d",{ willReadFrequently:true });
  const cropCanvas = document.createElement("canvas");
  const cropCtx = cropCanvas.getContext("2d",{ willReadFrequently:true });

  function preprocess(img){
    const d = img.data;
    for(let i=0; i<d.length; i+=4){
      let y = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114;
      y = (y - 128) * 1.45 + 128;
      const v = y > 135 ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v;
      d[i+3]=255;
    }
    return img;
  }

  // ---------- UI: selección de corte ----------
  function setCut(cut){
    selectedCut = cut;
    startBtn.disabled = !selectedCut;

    document.querySelectorAll("#cutsStart .cutBtn").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut === selectedCut);
    });
    document.querySelectorAll("#cutsCam .cutMini").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut === selectedCut);
    });

    chip.textContent = "Corte: " + selectedCut;

    // si ya hay un resultado mostrado, recalcular símbolo con el nuevo corte
    if(running && displayedCandidate){
      const shownNum = Number(displayedCandidate.split(" ")[0]);
      const inList = inRangesForCut_B(selectedCut, shownNum);
      showDecision(inList);
      statusEl.textContent = `Corte ${selectedCut} · ${displayedCandidate} (recalculado)`;
    }
  }

  document.querySelectorAll("[data-cut]").forEach(btn=>{
    btn.addEventListener("click", ()=> setCut(btn.dataset.cut));
  });

  // ---------- Mostrar símbolo (IN LISTA = X roja; NO EN LISTA = ✓ verde) ----------
  function showDecision(isInList){
    result.style.display = "block";
    if(isInList){
      result.className = "bad";
      result.textContent = "✕";
    } else {
      result.className = "ok";
      result.textContent = "✓";
    }
  }

  // ---------- OCR worker ----------
  async function initWorker(){
    if(worker) return worker;
    statusEl.textContent = "Cargando OCR…";
    worker = await Tesseract.createWorker("eng");
    await worker.setParameters({
      tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    });
    return worker;
  }

  // ---------- Iniciar cámara ----------
  async function startCameraOnce(){
    if(!selectedCut){
      statusEl.textContent = "Primero elige el corte.";
      return;
    }

    try{
      await initWorker();

      statusEl.textContent = "Solicitando cámara…";
      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode:"environment", width:{ideal:1280}, height:{ideal:720} },
          audio:false
        });
      }catch(e1){
        stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      }

      video.srcObject = stream;
      await new Promise(res => video.onloadedmetadata = res);
      await video.play();

      running = true;
      busy = false;

      // UI a modo cámara
      screenStart.classList.add("hidden");
      topBar.style.display = "flex";
      video.style.display = "block";
      roi.style.display = "block";
      serialLabel.style.display = "block";

      displayedCandidate = null;
      serialLabel.textContent = "—";
      result.style.display = "none";
      resetPending();

      chip.textContent = "Corte: " + selectedCut;
      statusEl.textContent = "✅ Cámara activa. Usa 'NUEVO ESCANEO' para escanear otro billete.";
      scanLoop();
    }catch(e){
      statusEl.textContent =
        "❌ Error iniciando.\n" +
        (e?.name || "Error") + ": " + (e?.message || e);
      stopAll();
    }
  }

  // ---------- Apagar cámara ----------
  function stopAll(){
    running = false;
    try{ stream?.getTracks?.().forEach(t=>t.stop()); }catch(_){}
    stream = null;
    video.srcObject = null;

    video.style.display = "none";
    roi.style.display = "none";
    serialLabel.style.display = "none";
    result.style.display = "none";
    topBar.style.display = "none";
    screenStart.classList.remove("hidden");

    displayedCandidate = null;
    serialLabel.textContent = "—";
    resetPending();
    statusEl.textContent = "Elige corte e inicia cámara.";
  }

  // ---------- Nuevo escaneo (reinicia solo el resultado, NO la cámara) ----------
  function newScan(){
    displayedCandidate = null;
    serialLabel.textContent = "—";
    result.style.display = "none";
    resetPending();
    statusEl.textContent = "Nuevo escaneo… apunta al serial dentro del marco.";
  }

  // ---------- Loop OCR ----------
  async function scanLoop(){
    if(!running) return;
    setTimeout(scanLoop, OCR_INTERVAL);
    if(busy) return;
    if(!video.videoWidth || !video.videoHeight) return;
    if(!selectedCut) return;

    busy = true;

    try{
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video, 0, 0);

      const vb = video.getBoundingClientRect();
      const rb = roi.getBoundingClientRect();
      const sx = video.videoWidth / vb.width;
      const sy = video.videoHeight / vb.height;

      let x = Math.floor((rb.left - vb.left) * sx);
      let y = Math.floor((rb.top - vb.top) * sy);
      let w = Math.floor(rb.width * sx);
      let h = Math.floor(rb.height * sy);

      x = Math.max(0, Math.min(x, video.videoWidth - 1));
      y = Math.max(0, Math.min(y, video.videoHeight - 1));
      w = Math.max(1, Math.min(w, video.videoWidth - x));
      h = Math.max(1, Math.min(h, video.videoHeight - y));

      const crop = frameCtx.getImageData(x, y, w, h);
      cropCanvas.width = w;
      cropCanvas.height = h;
      cropCtx.putImageData(preprocess(crop), 0, 0);

      const { data } = await worker.recognize(cropCanvas);
      const serial = extract(data?.text || "");

      // Si no detecta, NO borra nada (mantiene número y símbolo)
      if(!serial){
        return;
      }

      const candidate = `${serial.num} B`;

      const confirmed = feedCandidate(candidate);
      if(!confirmed){
        // no cambiamos lo mostrado
        return;
      }

      // Confirmado: fijamos el número y símbolo
      displayedCandidate = candidate;
      serialLabel.textContent = displayedCandidate;

      const inList = inRangesForCut_B(selectedCut, Number(serial.num));
      showDecision(inList);

      // Mantener símbolo mientras se mantenga el número
      statusEl.textContent =
        `Corte ${selectedCut} · ${displayedCandidate} → ${inList ? "EN LISTA (X)" : "NO EN LISTA (✓)"}`;

      // Opcional vibración cuando está EN LISTA
      if(inList){
        navigator.vibrate?.(120);
      }

      // Exigir 3 iguales para el próximo cambio
      resetPending();

    } finally {
      busy = false;
    }
  }

  // Botones
  startBtn.addEventListener("click", startCameraOnce);
  powerBtn.addEventListener("click", stopAll);
  newBtn.addEventListener("click", newScan);

  statusEl.textContent = "Elige corte e inicia cámara.";
</script>
</body>
</html>
