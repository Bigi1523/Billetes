<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Billetes - Serial Scanner</title>

<style>
  :root{
    --green:#19ff5a;
    --red:#ff3b30;
    --panel: rgba(0,0,0,.62);
  }
  body{ margin:0; background:#000; color:#fff; font-family:system-ui; overflow:hidden; }
  #wrap{ position:relative; width:100vw; height:100vh; }

  video{ width:100%; height:100%; object-fit:cover; background:#000; display:none; }

  #roi{
    position:absolute;
    border:4px solid var(--green);
    border-radius:16px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.32);
    pointer-events:none;
    display:none;
  }

  /* Número detectado (ARRIBA del ROI) */
  #serial{
    position:absolute;
    text-align:center;
    font-size:22px;
    font-weight:900;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    display:none;
    text-shadow: 0 2px 10px rgba(0,0,0,.7);
    pointer-events:none;
  }
  #serial.searching{ font-family:system-ui; font-size:22px; opacity:.95; }

  /* Símbolo grande */
  #result{
    position:absolute;
    top:56%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:160px;
    font-weight:900;
    display:none;
    text-shadow: 0 8px 18px rgba(0,0,0,.6);
    user-select:none;
    opacity:.92;
    text-align:center;
    cursor:default;
    pointer-events:none; /* se habilita solo cuando es X */
  }
  .ok{ color:var(--green); }
  .bad{ color:var(--red); }

  /* Texto debajo del símbolo */
  #resultText{
    position:absolute;
    top:calc(56% + 108px);
    left:50%;
    transform:translateX(-50%);
    width:min(560px, 92vw);
    text-align:center;
    font-weight:900;
    font-size:24px;
    letter-spacing:.2px;
    display:none;
    text-shadow: 0 6px 14px rgba(0,0,0,.65);
  }
  #resultText.small{
    font-size:18px;
    font-weight:800;
    opacity:.95;
  }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:22px; background:#000;
  }
  .hidden{ display:none !important; }
  .title{ font-size:22px; font-weight:900; text-align:center; opacity:.95; }

  button{
    border:none; border-radius:20px;
    font-weight:900; padding:14px 18px; font-size:18px;
    -webkit-tap-highlight-color: transparent;
  }
  .btnGreen{ background:var(--green); color:#000; }
  .btnRed{ background:var(--red); color:#fff; }
  .btnDark{ background:rgba(255,255,255,.10); color:#fff; }
  .btnBig{ width:min(440px, 92vw); padding:18px 22px; font-size:22px; }
  .pressable:active{ transform: scale(0.985); filter: brightness(1.08); }

  .cuts{ display:flex; gap:12px; width:min(440px, 92vw); justify-content:center; }
  .cutBtn{
    flex:1; background:rgba(255,255,255,.08); color:#fff;
    border:2px solid rgba(255,255,255,.14);
    padding:14px 0; border-radius:18px; font-size:20px; font-weight:900;
  }
  .cutBtn.active{ border-color:var(--green); box-shadow:0 0 0 3px rgba(25,255,90,.18) inset; }

  #topBar{
    position:absolute; left:12px; right:12px; top:12px;
    display:none; pointer-events:auto;
  }
  #topPanel{
    background:var(--panel); border-radius:22px; padding:12px;
    display:flex; flex-direction:column; gap:10px;
    align-items:center;
  }

  #newBtn{
    width:min(520px, 92vw);
    font-size:22px;
    padding:18px 22px;
    border-radius:26px;
  }

  #cutsCam{
    display:flex; gap:10px;
    background:rgba(255,255,255,.08);
    padding:10px; border-radius:20px;
    justify-content:center;
    width:min(520px, 92vw);
  }
  .cutMini{
    flex:1;
    background:rgba(0,0,0,.20);
    border:2px solid rgba(255,255,255,.10);
    color:#fff;
    border-radius:16px;
    padding:10px 0;
    font-size:18px;
    font-weight:900;
  }
  .cutMini.active{ border-color:var(--green); }

  #roiSizeRow{
    display:flex; gap:10px;
    background:rgba(255,255,255,.08);
    padding:10px; border-radius:20px;
    justify-content:center;
    width:min(520px, 92vw);
  }
  .roiMini{
    flex:1;
    background:rgba(0,0,0,.20);
    border:2px solid rgba(255,255,255,.10);
    color:#fff;
    border-radius:16px;
    padding:10px 0;
    font-size:16px;
    font-weight:900;
  }
  .roiMini.active{ border-color:var(--green); }

  #powerBottom{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom: calc(20px + env(safe-area-inset-bottom));
    width:min(520px, 92vw);
    display:none;
    pointer-events:auto;
  }
  #powerBottom button{
    width:100%;
    padding:18px 22px;
    font-size:22px;
    border-radius:26px;
  }

  #toast{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top: 10px;
    background: rgba(0,0,0,.72);
    border: 1px solid rgba(255,255,255,.14);
    padding:10px 14px;
    border-radius:14px;
    font-weight:800;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
  }
  #toast.show{ opacity:1; }

  /* ---------- MODAL TABLA ---------- */
  #tableModal{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.86);
    display:none;
    z-index:9999;
  }
  #tableModal.show{ display:block; }
  #tableModalInner{
    position:absolute;
    inset: 0;
    padding: calc(14px + env(safe-area-inset-top)) 14px calc(14px + env(safe-area-inset-bottom)) 14px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  #tableHeader{
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 18px;
    padding: 12px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  #modalSerial{
    font-weight:900;
    font-size:20px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  #modalClose{
    background: rgba(255,255,255,.12);
    color:#fff;
    border-radius:14px;
    padding:10px 14px;
    font-weight:900;
    font-size:16px;
  }
  #tableImgWrap{
    flex:1;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.10);
    border-radius: 18px;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #tableImg{
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
  }
  #modalHint{
    text-align:center;
    opacity:.8;
    font-weight:800;
    font-size:14px;
  }
</style>
</head>

<body>
<div id="wrap">
  <video id="video" playsinline muted></video>

  <div id="roi"></div>
  <div id="serial" class="searching">Buscando…</div>

  <div id="result"></div>
  <div id="resultText"></div>

  <div id="topBar">
    <div id="topPanel">
      <button id="newBtn" class="btnDark pressable">NUEVO ESCANEO</button>

      <div id="cutsCam">
        <button class="cutMini pressable" data-cut="10">10</button>
        <button class="cutMini pressable" data-cut="20">20</button>
        <button class="cutMini pressable" data-cut="50">50</button>
      </div>

      <div id="roiSizeRow">
        <button class="roiMini pressable" data-roi="S">Pequeño</button>
        <button class="roiMini pressable" data-roi="M">Mediano</button>
        <button class="roiMini pressable" data-roi="L">Grande</button>
      </div>
    </div>
  </div>

  <div id="powerBottom">
    <button id="powerBtn" class="btnRed pressable">APAGAR CÁMARA</button>
  </div>

  <div id="toast">Elegir corte</div>

  <div id="screenStart" class="screen">
    <div class="title">Elige el corte del billete</div>
    <div class="cuts" id="cutsStart">
      <button class="cutBtn pressable" data-cut="10">10</button>
      <button class="cutBtn pressable" data-cut="20">20</button>
      <button class="cutBtn pressable" data-cut="50">50</button>
    </div>
    <button id="startBtn" class="btnBig btnGreen pressable">INICIAR CÁMARA</button>
  </div>
</div>

<!-- MODAL TABLA -->
<div id="tableModal">
  <div id="tableModalInner">
    <div id="tableHeader">
      <div id="modalSerial">—</div>
      <button id="modalClose" class="pressable">CERRAR</button>
    </div>
    <div id="tableImgWrap">
      <img id="tableImg" alt="Tabla de rangos"/>
    </div>
    <div id="modalHint">Tabla del corte seleccionado</div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const video = document.getElementById("video");
  const roi = document.getElementById("roi");
  const serialLabel = document.getElementById("serial");
  const result = document.getElementById("result");
  const resultText = document.getElementById("resultText");
  const topBar = document.getElementById("topBar");
  const powerBottom = document.getElementById("powerBottom");
  const screenStart = document.getElementById("screenStart");
  const startBtn = document.getElementById("startBtn");
  const newBtn = document.getElementById("newBtn");
  const powerBtn = document.getElementById("powerBtn");
  const toast = document.getElementById("toast");

  const tableModal = document.getElementById("tableModal");
  const modalSerial = document.getElementById("modalSerial");
  const modalClose = document.getElementById("modalClose");
  const tableImg = document.getElementById("tableImg");

  let selectedCut = localStorage.getItem("selectedCut") || null;
  let rangesData = {};
  let worker = null;
  let stream = null;
  let running = false;
  let busy = false;

  // Mantengo la lógica de tiempos/estabilidad como venías usando
  const OCR_INTERVAL = 260;
  let NEED_SAME = 2;                  // primer “fijado”
  const NEED_SAME_AFTER_FIRST = 3;    // después más estable

  let pendingCandidate = null;
  let pendingCount = 0;

  let displayedNumber = null;      // SOLO número (8 o 9 dígitos)
  let displayedMatch = null;       // {start,end} o null

  let dotsTimer = null;
  let dotsPhase = 0;

  const ROI_PRESETS = {
    S: { w: 0.62, h: 0.18 },
    M: { w: 0.72, h: 0.22 },
    L: { w: 0.82, h: 0.26 }
  };
  let roiPreset = localStorage.getItem("roiPreset") || "S";

  // Tablas (opcional: sube estas imágenes al repo)
  const TABLE_IMAGES = {
    "10": "tables/10.png",
    "20": "tables/20.png",
    "50": "tables/50.png",
  };

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), 900);
  }

  async function loadRanges(){
    rangesData = await fetch("ranges.json?v="+Date.now(), {cache:"no-store"}).then(r=>r.json());
  }
  loadRanges().catch(()=>{});

  // Busca rango en TODAS las letras (A/B/...) pero al OCR le ignoramos letras
  function findRangeForCut(cut, num){
    const cutObj = rangesData?.[cut];
    if(!cutObj) return null;

    const keys = Object.keys(cutObj);
    for(const k of keys){
      const list = cutObj[k];
      if(!Array.isArray(list)) continue;
      for(const r of list){
        if(num >= r.start && num <= r.end){
          return { start: r.start, end: r.end };
        }
      }
    }
    return null;
  }

  function resetPending(){ pendingCandidate=null; pendingCount=0; }

  function feedCandidate(candidate){
    if(candidate === pendingCandidate) pendingCount++;
    else { pendingCandidate=candidate; pendingCount=1; }
    return pendingCount >= NEED_SAME;
  }

  function startDots(){
    if(dotsTimer) return;
    dotsPhase = 0;
    dotsTimer = setInterval(()=>{
      if(!running) return;
      if(displayedNumber) return;
      const dots = ".".repeat((dotsPhase % 3) + 1);
      serialLabel.textContent = "Buscando" + dots;
      dotsPhase++;
    }, 350);
  }
  function stopDots(){ if(dotsTimer){ clearInterval(dotsTimer); dotsTimer=null; } }

  const frameCanvas = document.createElement("canvas");
  const frameCtx = frameCanvas.getContext("2d",{willReadFrequently:true});
  const cropCanvas = document.createElement("canvas");
  const cropCtx = cropCanvas.getContext("2d",{willReadFrequently:true});

  // Preprocess: lo mantenemos como venías (binariza para OCR)
  function preprocess(img){
    const d = img.data;
    let min=255, max=0;
    for(let i=0;i<d.length;i+=4){
      const y = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114;
      if(y<min) min=y; if(y>max) max=y;
      d[i]=d[i+1]=d[i+2]=y;
    }
    const range = Math.max(1, max-min);
    const thr = min + range*0.55;
    for(let i=0;i<d.length;i+=4){
      let y = (d[i]-min) * (255/range);
      const v = y > (thr-min)*(255/range) ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
    }
    return img;
  }

  // ✅ Parser SIN modificar números:
  // Ignora letras simplemente extrayendo el primer grupo de 8 o 9 dígitos.
  function parseSerialNumber(text){
    // Reemplaza todo lo que no sea dígito por espacios
    const onlyDigits = (text || "").replace(/[^\d]/g, " ");
    // Toma el primer grupo exacto de 8 o 9 dígitos
    const m = onlyDigits.match(/\b(\d{8,9})\b/);
    if(!m) return null;
    return m[1]; // tal cual
  }

  function showDecision(match){
    result.style.display="block";
    resultText.style.display="block";

    if(match){
      result.className="bad";
      result.textContent="✕";
      resultText.className="small";
      resultText.textContent = `Rango: ${match.start} – ${match.end}`;

      result.style.pointerEvents = "auto";
      result.style.cursor = "pointer";
      result.title = "Toca para ver la tabla";
    } else {
      result.className="ok";
      result.textContent="✓";
      resultText.className="";
      resultText.textContent = "Válido";

      result.style.pointerEvents = "none";
      result.style.cursor = "default";
      result.title = "";
    }
  }

  function clearDecision(){
    result.style.display="none";
    resultText.style.display="none";
    result.textContent="";
    resultText.textContent="";
    result.style.pointerEvents="none";
    result.style.cursor="default";
    result.title="";
  }

  function setCut(cut){
    selectedCut = cut;
    localStorage.setItem("selectedCut", cut);

    document.querySelectorAll("#cutsStart .cutBtn").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut===selectedCut);
    });
    document.querySelectorAll("#cutsCam .cutMini").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut===selectedCut);
    });

    if(running && displayedNumber){
      displayedMatch = findRangeForCut(selectedCut, Number(displayedNumber));
      showDecision(displayedMatch);
    }
  }
  document.querySelectorAll("[data-cut]").forEach(btn=>{
    btn.addEventListener("click", ()=> setCut(btn.dataset.cut));
  });

  function layoutROI(){
    if(!running) return;

    const wrapRect = document.getElementById("wrap").getBoundingClientRect();
    const topRect = topBar.getBoundingClientRect();
    const bottomRect = powerBottom.getBoundingClientRect();

    const safeTop = topRect.bottom + 12;
    const safeBottom = bottomRect.top - 12;

    const availableTop = Math.max(wrapRect.top, safeTop);
    const availableBottom = Math.min(wrapRect.bottom, safeBottom);

    const availH = Math.max(120, availableBottom - availableTop);
    const availW = wrapRect.width;

    const preset = ROI_PRESETS[roiPreset] || ROI_PRESETS.S;

    const roiW = Math.floor(availW * preset.w);
    const roiH = Math.floor(availH * preset.h);

    const left = Math.floor((availW - roiW) / 2);
    const top = Math.floor(availableTop - wrapRect.top + (availH - roiH) * 0.18);

    roi.style.left = left + "px";
    roi.style.top = top + "px";
    roi.style.width = roiW + "px";
    roi.style.height = roiH + "px";

    // Texto del número arriba del ROI
    const desiredSerialTop = top - 42;
    const minSerialTop = Math.floor(topRect.bottom - wrapRect.top + 6);
    const serialTop = Math.max(minSerialTop, desiredSerialTop);

    serialLabel.style.left = left + "px";
    serialLabel.style.top = serialTop + "px";
    serialLabel.style.width = roiW + "px";
  }

  function applyRoiPreset(p){
    roiPreset = p;
    localStorage.setItem("roiPreset", p);
    document.querySelectorAll(".roiMini").forEach(b=>{
      b.classList.toggle("active", b.dataset.roi === p);
    });
    layoutROI();
  }
  document.querySelectorAll(".roiMini").forEach(b=>{
    b.addEventListener("click", ()=> applyRoiPreset(b.dataset.roi));
  });

  async function initWorker(){
    if(worker) return worker;
    worker = await Tesseract.createWorker("eng");
    await worker.setParameters({
      // Deja letras habilitadas (da igual), porque nosotros igual extraemos solo dígitos
      tessedit_char_whitelist:"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      tessedit_pageseg_mode:"7"
    });
    return worker;
  }

  async function startCamera(){
    if(!selectedCut){
      showToast("Elegir corte");
      return;
    }

    try{
      await initWorker();

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:"environment", width:{ideal:1920}, height:{ideal:1080} },
          audio:false
        });
      }catch{
        stream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
      }

      video.srcObject = stream;
      await new Promise(res=> video.onloadedmetadata=res);
      await video.play();

      running=true; busy=false;

      screenStart.classList.add("hidden");
      topBar.style.display="block";
      powerBottom.style.display="block";
      video.style.display="block";
      roi.style.display="block";
      serialLabel.style.display="block";

      requestAnimationFrame(()=> layoutROI());

      displayedNumber=null;
      displayedMatch=null;
      serialLabel.className="searching";
      serialLabel.textContent="Buscando…";
      clearDecision();
      resetPending();

      NEED_SAME=2;
      startDots();
      scanLoop();

    }catch{
      showToast("No se pudo iniciar cámara");
      stopAll();
    }
  }

  function stopAll(){
    running=false; stopDots();
    try{ stream?.getTracks?.().forEach(t=>t.stop()); }catch(_){}
    stream=null; video.srcObject=null;

    video.style.display="none";
    roi.style.display="none";
    serialLabel.style.display="none";
    clearDecision();
    topBar.style.display="none";
    powerBottom.style.display="none";
    screenStart.classList.remove("hidden");

    displayedNumber=null;
    displayedMatch=null;
    serialLabel.textContent="—";
    serialLabel.className="";
    resetPending();

    closeTableModal();
  }

  function newScan(){
    navigator.vibrate?.(40);
    displayedNumber=null;
    displayedMatch=null;
    serialLabel.className="searching";
    serialLabel.textContent="Buscando…";
    clearDecision();
    resetPending();
    NEED_SAME=2;
    startDots();
  }

  function openTableModal(){
    if(!displayedNumber) return;
    const src = TABLE_IMAGES[selectedCut];
    if(!src) return;

    modalSerial.textContent = displayedNumber;
    tableImg.src = src + "?v=" + Date.now();
    tableModal.classList.add("show");
  }
  function closeTableModal(){
    tableModal.classList.remove("show");
  }

  // Abrir modal tocando la X roja
  result.addEventListener("click", ()=>{
    if(displayedMatch){
      openTableModal();
    }
  });
  modalClose.addEventListener("click", closeTableModal);
  tableModal.addEventListener("click", (e)=>{
    if(e.target === tableModal) closeTableModal();
  });

  async function scanLoop(){
    if(!running) return;
    setTimeout(scanLoop, OCR_INTERVAL);
    if(busy) return;
    if(!video.videoWidth || !video.videoHeight) return;

    busy=true;
    try{
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video,0,0);

      const vb = video.getBoundingClientRect();
      const rb = roi.getBoundingClientRect();
      const sx = video.videoWidth / vb.width;
      const sy = video.videoHeight / vb.height;

      let x = Math.floor((rb.left - vb.left)*sx);
      let y = Math.floor((rb.top - vb.top)*sy);
      let w = Math.floor(rb.width*sx);
      let h = Math.floor(rb.height*sy);

      x = Math.max(0, Math.min(x, video.videoWidth-1));
      y = Math.max(0, Math.min(y, video.videoHeight-1));
      w = Math.max(1, Math.min(w, video.videoWidth-x));
      h = Math.max(1, Math.min(h, video.videoHeight-y));

      // recorte interno (quita bordes)
      const padX = Math.floor(w * 0.06);
      const padY = Math.floor(h * 0.18);
      x += padX; y += padY;
      w -= padX*2; h -= padY*2;
      if(w < 20 || h < 20) return;

      const crop = frameCtx.getImageData(x,y,w,h);

      const scale = 2.2;
      cropCanvas.width = Math.floor(w*scale);
      cropCanvas.height = Math.floor(h*scale);

      const tmp = document.createElement("canvas");
      tmp.width=w; tmp.height=h;
      tmp.getContext("2d").putImageData(preprocess(crop),0,0);
      cropCtx.imageSmoothingEnabled=false;
      cropCtx.drawImage(tmp,0,0,cropCanvas.width,cropCanvas.height);

      const { data } = await worker.recognize(cropCanvas);

      // ✅ Mantener OCR “tal cual”: solo extraer 8 o 9 dígitos, ignorando letras.
      const numStr = parseSerialNumber(data?.text || "");
      if(!numStr) return;

      const confirmed = feedCandidate(numStr);
      if(!confirmed) return;

      displayedNumber = numStr;
      serialLabel.className="";
      serialLabel.textContent = displayedNumber;
      stopDots();

      displayedMatch = findRangeForCut(selectedCut, Number(displayedNumber));
      showDecision(displayedMatch);

      NEED_SAME = NEED_SAME_AFTER_FIRST;
      resetPending();

      if(displayedMatch){
        navigator.vibrate?.(120);
      }

    } finally {
      busy=false;
    }
  }

  // Eventos
  startBtn.addEventListener("click", startCamera);
  powerBtn.addEventListener("click", stopAll);
  newBtn.addEventListener("click", newScan);

  // Inicial
  if(selectedCut) setCut(selectedCut);
  applyRoiPreset(roiPreset);

  window.addEventListener("resize", ()=> layoutROI());
  window.addEventListener("orientationchange", ()=> setTimeout(layoutROI, 150));

  // Auto start si ya hay corte elegido (sin tener que apretar cada vez)
  async function autoStartIfPossible(){
    if(!selectedCut) return;
    try{ await startCamera(); }catch(_){}
  }
  window.addEventListener("load", ()=> autoStartIfPossible());
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState === "visible" && !running){
      autoStartIfPossible();
    }
  });
</script>
</body>
</html>
