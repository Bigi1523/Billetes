<script type="module">
import { createWorker } from "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.esm.min.js";

const video = document.getElementById("video");
const roiBox = document.getElementById("roiBox");
const statusEl = document.getElementById("status");
const startBtn = document.getElementById("startBtn");
const pill = document.getElementById("pill");

// 👇 Para depurar, comenta esto si sospechas cache viejo
// if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

// Forzar atributos iOS
video.setAttribute("playsinline", "");
video.muted = true;
video.autoplay = true;

let rangesData = {};
try {
  rangesData = await fetch("ranges.json", { cache: "no-store" }).then(r => r.json());
} catch (e) {
  statusEl.textContent = "No pude cargar ranges.json: " + e;
}

for (const k of Object.keys(rangesData)) {
  rangesData[k] = (rangesData[k] || []).slice().sort((a,b) => a.start - b.start);
}

function inRanges(letter, number) {
  const list = rangesData[letter];
  if (!list || !list.length) return false;
  let lo = 0, hi = list.length - 1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const r = list[mid];
    if (number < r.start) hi = mid - 1;
    else if (number > r.end) lo = mid + 1;
    else return true;
  }
  return false;
}

function extractSerial(text) {
  const t = text.toUpperCase()
    .replace(/[^\dA-Z ]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
  const m = t.match(/(\d{9})\s*([A-Z])/);
  if (!m) return null;
  return { numberStr: m[1], letter: m[2], cleaned: t };
}

const frameCanvas = document.createElement("canvas");
const frameCtx = frameCanvas.getContext("2d", { willReadFrequently: true });
const cropCanvas = document.createElement("canvas");
const cropCtx = cropCanvas.getContext("2d", { willReadFrequently: true });

function preprocessToBW(imgData) {
  const d = imgData.data;
  for (let i = 0; i < d.length; i += 4) {
    const r = d[i], g = d[i+1], b = d[i+2];
    let y = (r*0.299 + g*0.587 + b*0.114);
    y = (y - 128) * 1.35 + 128;
    const v = y > 140 ? 255 : 0;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  return imgData;
}

const worker = await createWorker("eng");
await worker.setParameters({
  tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
});

let running = false;
let busy = false;
let freezeUntil = 0;
let OCR_INTERVAL = 600;
pill.textContent = `OCR: ${OCR_INTERVAL}ms`;

let stream = null;

async function startCamera() {
  statusEl.textContent = "Solicitando cámara… (si no aparece diálogo, revisa permisos en Ajustes > Safari > Cámara)";

  // Constraints “suaves” primero (iOS es quisquilloso)
  const constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    },
    audio: false
  };

  try {
    stream = await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e1) {
    // Fallback: lo mínimo
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
    } catch (e2) {
      statusEl.textContent =
        "❌ No se pudo acceder a la cámara.\n" +
        "Error 1: " + (e1?.name || e1) + " - " + (e1?.message || "") + "\n" +
        "Error 2: " + (e2?.name || e2) + " - " + (e2?.message || "") + "\n\n" +
        "Solución típica: Ajustes > Safari > Cámara = Permitir, y recargar.";
      throw e2;
    }
  }

  video.srcObject = stream;

  await new Promise((res) => {
    video.onloadedmetadata = () => res();
  });

  try {
    await video.play();
  } catch (e) {
    statusEl.textContent =
      "La cámara se obtuvo, pero el video no pudo reproducirse.\n" +
      (e?.name || e) + " - " + (e?.message || "") + "\n" +
      "Prueba tocar la pantalla y volver a presionar Iniciar.";
    throw e;
  }

  const track = stream.getVideoTracks?.()[0];
  statusEl.textContent =
    "✅ Cámara activa.\n" +
    `Track: ${track?.label || "?"}\n` +
    "Alinea SOLO el serial dentro del rectángulo.";
}

startBtn.onclick = async () => {
  if (running) return;
  try {
    await startCamera();
    running = true;
    loop();
  } catch (_) {
    // el error ya se imprime en statusEl
  }
};

async function loop() {
  if (!running) return;
  setTimeout(loop, OCR_INTERVAL);

  if (Date.now() < freezeUntil) return;
  if (busy) return;
  if (!video.videoWidth || !video.videoHeight) return;

  busy = true;
  try {
    frameCanvas.width = video.videoWidth;
    frameCanvas.height = video.videoHeight;
    frameCtx.drawImage(video, 0, 0);

    const vb = video.getBoundingClientRect();
    const rb = roiBox.getBoundingClientRect();
    const scaleX = video.videoWidth / vb.width;
    const scaleY = video.videoHeight / vb.height;

    let x = Math.floor((rb.left - vb.left) * scaleX);
    let y = Math.floor((rb.top - vb.top) * scaleY);
    let w = Math.floor(rb.width * scaleX);
    let h = Math.floor(rb.height * scaleY);

    x = Math.max(0, Math.min(x, video.videoWidth - 1));
    y = Math.max(0, Math.min(y, video.videoHeight - 1));
    w = Math.max(1, Math.min(w, video.videoWidth - x));
    h = Math.max(1, Math.min(h, video.videoHeight - y));

    const crop = frameCtx.getImageData(x, y, w, h);
    const bw = preprocessToBW(crop);

    cropCanvas.width = w;
    cropCanvas.height = h;
    cropCtx.putImageData(bw, 0, 0);

    const { data } = await worker.recognize(cropCanvas);
    const rawText = (data?.text ?? "").toUpperCase();

    const serial = extractSerial(rawText);
    if (!serial) {
      statusEl.textContent = `No detectado.\nOCR: ${(rawText || "").trim()}`;
      return;
    }

    if (serial.letter !== "B") {
      statusEl.textContent = `Detectado: ${serial.numberStr} ${serial.letter} → descartado\nOCR: ${serial.cleaned}`;
      return;
    }

    const n = Number(serial.numberStr);
    const ok = inRanges("B", n);

    if (ok) {
      statusEl.textContent = `✅ ${serial.numberStr} B (EN RANGO)\nOCR: ${serial.cleaned}`;
      navigator.vibrate?.(200);
      freezeUntil = Date.now() + 1500;
    } else {
      statusEl.textContent = `❌ ${serial.numberStr} B (fuera de rango)\nOCR: ${serial.cleaned}`;
    }
  } finally {
    busy = false;
  }
}
</script>
