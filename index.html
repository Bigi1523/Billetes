<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Billetes - Serial Scanner</title>

<style>
  :root{
    --green:#19ff5a;
    --red:#ff3b30;
    --panel: rgba(0,0,0,.62);
  }
  body{ margin:0; background:#000; color:#fff; font-family:system-ui; overflow:hidden; }
  #wrap{ position:relative; width:100vw; height:100vh; }

  video{ width:100%; height:100%; object-fit:cover; background:#000; display:none; }

  /* ROI (por defecto pequeño) */
  #roi{
    position:absolute;
    top:22%;
    right:10%;
    width:62%;
    height:12%;
    border:4px solid var(--green);
    border-radius:16px;
    box-shadow:0 0 0 9999px rgba(0,0,0,.32);
    pointer-events:none;
    display:none;
  }

  #serial{
    position:absolute;
    top:calc(22% + 12% + 14px);
    right:10%;
    width:62%;
    text-align:center;
    font-size:22px;
    font-weight:900;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    display:none;
    text-shadow: 0 2px 10px rgba(0,0,0,.7);
  }
  #serial.warn{ color:#ffd60a; font-family:system-ui; font-size:18px; }
  #serial.searching{ font-family:system-ui; font-size:22px; opacity:.95; }

  #result{
    position:absolute;
    top:56%;
    left:50%;
    transform:translate(-50%,-50%);
    font-size:160px;
    font-weight:900;
    display:none;
    text-shadow: 0 8px 18px rgba(0,0,0,.6);
    user-select:none;
    pointer-events:none;
    opacity:.92;
  }
  .ok{ color:var(--green); }
  .bad{ color:var(--red); }

  .screen{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:18px; padding:22px; background:#000;
  }
  .hidden{ display:none !important; }
  .title{ font-size:22px; font-weight:900; text-align:center; opacity:.95; }

  button{
    border:none; border-radius:20px;
    font-weight:900; padding:14px 18px; font-size:18px;
    -webkit-tap-highlight-color: transparent;
  }
  .btnGreen{ background:var(--green); color:#000; }
  .btnRed{ background:var(--red); color:#fff; }
  .btnDark{ background:rgba(255,255,255,.10); color:#fff; }
  .btnBig{ width:min(440px, 92vw); padding:18px 22px; font-size:22px; }

  /* Press feedback */
  .pressable:active{
    transform: scale(0.985);
    filter: brightness(1.08);
  }

  .cuts{ display:flex; gap:12px; width:min(440px, 92vw); justify-content:center; }
  .cutBtn{
    flex:1; background:rgba(255,255,255,.08); color:#fff;
    border:2px solid rgba(255,255,255,.14);
    padding:14px 0; border-radius:18px; font-size:20px; font-weight:900;
  }
  .cutBtn.active{ border-color:var(--green); box-shadow:0 0 0 3px rgba(25,255,90,.18) inset; }

  #topBar{
    position:absolute; left:12px; right:12px; top:12px;
    display:none; pointer-events:auto;
  }
  #topPanel{
    background:var(--panel); border-radius:22px; padding:12px;
    display:flex; flex-direction:column; gap:10px;
    align-items:center;
  }

  /* NUEVO ESCANEO centrado arriba */
  #newBtn{
    width:min(520px, 92vw);
    font-size:22px;
    padding:18px 22px;
    border-radius:26px;
  }

  /* Cortes centrados */
  #cutsCam{
    display:flex; gap:10px;
    background:rgba(255,255,255,.08);
    padding:10px; border-radius:20px;
    justify-content:center;
    width:min(520px, 92vw);
  }
  .cutMini{
    flex:1;
    background:rgba(0,0,0,.20);
    border:2px solid rgba(255,255,255,.10);
    color:#fff;
    border-radius:16px;
    padding:10px 0;
    font-size:18px;
    font-weight:900;
  }
  .cutMini.active{ border-color:var(--green); }

  /* Tamaño ventana centrado sin texto ROI */
  #roiSizeRow{
    display:flex; gap:10px;
    background:rgba(255,255,255,.08);
    padding:10px; border-radius:20px;
    justify-content:center;
    width:min(520px, 92vw);
  }
  .roiMini{
    flex:1;
    background:rgba(0,0,0,.20);
    border:2px solid rgba(255,255,255,.10);
    color:#fff;
    border-radius:16px;
    padding:10px 0;
    font-size:16px;
    font-weight:900;
  }
  .roiMini.active{ border-color:var(--green); }

  /* APAGAR CÁMARA más arriba y respetando safe-area */
  #powerBottom{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    bottom: calc(20px + env(safe-area-inset-bottom));
    width:min(520px, 92vw);
    display:none;
    pointer-events:auto;
  }
  #powerBottom button{
    width:100%;
    padding:18px 22px;
    font-size:22px;
    border-radius:26px;
  }

  #toast{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    top: 10px;
    background: rgba(0,0,0,.72);
    border: 1px solid rgba(255,255,255,.14);
    padding:10px 14px;
    border-radius:14px;
    font-weight:800;
    font-size:14px;
    opacity:0;
    pointer-events:none;
    transition:opacity .18s ease;
  }
  #toast.show{ opacity:1; }

  #status{
    position:absolute; left:12px; right:12px; bottom:6px;
    font-size:12px; opacity:.55; white-space:pre-wrap;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
</style>
</head>

<body>
<div id="wrap">
  <video id="video" playsinline muted></video>

  <div id="roi"></div>
  <div id="serial" class="searching">Buscando…</div>
  <div id="result"></div>

  <div id="topBar">
    <div id="topPanel">
      <button id="newBtn" class="btnDark pressable">NUEVO ESCANEO</button>

      <div id="cutsCam">
        <button class="cutMini pressable" data-cut="10">10</button>
        <button class="cutMini pressable" data-cut="20">20</button>
        <button class="cutMini pressable" data-cut="50">50</button>
      </div>

      <div id="roiSizeRow" title="Tamaño de ventana">
        <button class="roiMini pressable active" data-roi="S">Pequeño</button>
        <button class="roiMini pressable" data-roi="M">Mediano</button>
        <button class="roiMini pressable" data-roi="L">Grande</button>
      </div>
    </div>
  </div>

  <div id="powerBottom">
    <button id="powerBtn" class="btnRed pressable">APAGAR CÁMARA</button>
  </div>

  <div id="toast">Elegir corte</div>
  <div id="status"></div>

  <div id="screenStart" class="screen">
    <div class="title">Elige el corte del billete</div>
    <div class="cuts" id="cutsStart">
      <button class="cutBtn pressable" data-cut="10">10</button>
      <button class="cutBtn pressable" data-cut="20">20</button>
      <button class="cutBtn pressable" data-cut="50">50</button>
    </div>
    <button id="startBtn" class="btnBig btnGreen pressable">INICIAR CÁMARA</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
  const video = document.getElementById("video");
  const roi = document.getElementById("roi");
  const serialLabel = document.getElementById("serial");
  const result = document.getElementById("result");
  const statusEl = document.getElementById("status");
  const topBar = document.getElementById("topBar");
  const powerBottom = document.getElementById("powerBottom");

  const screenStart = document.getElementById("screenStart");
  const startBtn = document.getElementById("startBtn");
  const newBtn = document.getElementById("newBtn");
  const powerBtn = document.getElementById("powerBtn");
  const toast = document.getElementById("toast");

  video.autoplay = true;
  video.muted = true;
  video.setAttribute("playsinline","");

  let selectedCut = localStorage.getItem("selectedCut") || null;
  let rangesData = {};
  let worker = null;
  let stream = null;
  let running = false;
  let busy = false;

  const OCR_INTERVAL = 260;

  let NEED_SAME = 2;
  const NEED_SAME_AFTER_FIRST = 3;
  let pendingCandidate = null;
  let pendingCount = 0;

  let displayedCandidate = null;
  let displayedInList = null;

  let nonBCount = 0;
  const NONB_NEED = 2;

  let dotsTimer = null;
  let dotsPhase = 0;

  const ROI_PRESETS = {
    S: { top:"22%", right:"10%", width:"62%", height:"12%" },
    M: { top:"21%", right:"8%",  width:"70%", height:"14%" },
    L: { top:"20%", right:"5%",  width:"78%", height:"16%" }
  };
  let roiPreset = localStorage.getItem("roiPreset") || "S";

  function showToast(msg){
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(()=>toast.classList.remove("show"), 900);
  }

  function applyRoiPreset(p){
    roiPreset = p;
    localStorage.setItem("roiPreset", p);
    const s = ROI_PRESETS[p];
    roi.style.top = s.top;
    roi.style.right = s.right;
    roi.style.width = s.width;
    roi.style.height = s.height;

    serialLabel.style.top = `calc(${s.top} + ${s.height} + 14px)`;
    serialLabel.style.right = s.right;
    serialLabel.style.width = s.width;

    document.querySelectorAll(".roiMini").forEach(b=>{
      b.classList.toggle("active", b.dataset.roi === p);
    });
  }

  document.querySelectorAll(".roiMini").forEach(b=>{
    b.addEventListener("click", ()=> applyRoiPreset(b.dataset.roi));
  });

  function startDots(){
    if(dotsTimer) return;
    dotsPhase = 0;
    dotsTimer = setInterval(()=>{
      if(!running) return;
      if(displayedCandidate) return;
      if(serialLabel.classList.contains("warn")) return;
      const dots = ".".repeat((dotsPhase % 3) + 1);
      serialLabel.textContent = "Buscando" + dots;
      dotsPhase++;
    }, 350);
  }
  function stopDots(){ if(dotsTimer){ clearInterval(dotsTimer); dotsTimer=null; } }

  function resetPending(){ pendingCandidate=null; pendingCount=0; }
  function feedCandidate(candidate){
    if(candidate === pendingCandidate) pendingCount++;
    else { pendingCandidate=candidate; pendingCount=1; }
    return pendingCount >= NEED_SAME;
  }

  async function loadRanges(){
    try{
      rangesData = await fetch("ranges.json?v="+Date.now(), {cache:"no-store"}).then(r=>r.json());
      statusEl.textContent = "";
    }catch(e){
      statusEl.textContent = "❌ No pude cargar ranges.json.\n"+(e?.message||e);
    }
  }
  loadRanges();

  function inRangesForCut_B(cut, num){
    const list = rangesData?.[cut]?.["B"];
    if(!list) return false;
    for(const r of list){
      if(num >= r.start && num <= r.end) return true;
    }
    return false;
  }

  function normalizeDigits(s){
    return (s||"")
      .replace(/O/g,"0").replace(/D/g,"0")
      .replace(/I/g,"1").replace(/L/g,"1")
      .replace(/Z/g,"2").replace(/S/g,"5");
  }

  function parseSerial(text){
    const t = (text||"").toUpperCase().replace(/[^\dA-Z]/g," ").replace(/\s+/g," ").trim();
    const m = t.match(/(?:^|\s)([0-9A-Z]{9})\s*([A-Z])(?:\s|$)/);
    if(!m) return {status:"none"};
    const num = normalizeDigits(m[1]);
    const letter = m[2];
    if(!/^\d{9}$/.test(num)) return {status:"none"};
    return {status:"found", num, letter};
  }

  const frameCanvas = document.createElement("canvas");
  const frameCtx = frameCanvas.getContext("2d",{willReadFrequently:true});
  const cropCanvas = document.createElement("canvas");
  const cropCtx = cropCanvas.getContext("2d",{willReadFrequently:true});

  function preprocess(img){
    const d = img.data;
    let min=255, max=0;
    for(let i=0;i<d.length;i+=4){
      const y = d[i]*.299 + d[i+1]*.587 + d[i+2]*.114;
      if(y<min) min=y; if(y>max) max=y;
      d[i]=d[i+1]=d[i+2]=y;
    }
    const range = Math.max(1, max-min);
    const thr = min + range*0.55;
    for(let i=0;i<d.length;i+=4){
      let y = (d[i]-min) * (255/range);
      const v = y > (thr-min)*(255/range) ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
    }
    return img;
  }

  function setCut(cut){
    selectedCut = cut;
    localStorage.setItem("selectedCut", cut);

    document.querySelectorAll("#cutsStart .cutBtn").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut===selectedCut);
    });
    document.querySelectorAll("#cutsCam .cutMini").forEach(b=>{
      b.classList.toggle("active", b.dataset.cut===selectedCut);
    });

    // si ya hay número fijado, recalcula símbolo
    if(running && displayedCandidate){
      const shownNum = Number(displayedCandidate.split(" ")[0]);
      displayedInList = inRangesForCut_B(selectedCut, shownNum);
      showDecision(displayedInList);
    }
  }

  document.querySelectorAll("[data-cut]").forEach(btn=>{
    btn.addEventListener("click", ()=> setCut(btn.dataset.cut));
  });

  function showDecision(isInList){
    result.style.display="block";
    if(isInList){ result.className="bad"; result.textContent="✕"; }
    else { result.className="ok"; result.textContent="✓"; }
  }

  async function initWorker(){
    if(worker) return worker;
    worker = await Tesseract.createWorker("eng");
    await worker.setParameters({
      tessedit_char_whitelist:"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      tessedit_pageseg_mode:"7"
    });
    return worker;
  }

  async function startCamera(){
    if(!selectedCut){
      showToast("Elegir corte");
      return;
    }

    try{
      await initWorker();

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video:{ facingMode:"environment", width:{ideal:1920}, height:{ideal:1080} },
          audio:false
        });
      }catch{
        stream = await navigator.mediaDevices.getUserMedia({video:true, audio:false});
      }

      video.srcObject = stream;
      await new Promise(res=> video.onloadedmetadata=res);
      await video.play();

      running=true; busy=false;

      screenStart.classList.add("hidden");
      topBar.style.display="block";
      powerBottom.style.display="block";
      video.style.display="block";
      roi.style.display="block";
      serialLabel.style.display="block";

      applyRoiPreset(roiPreset);

      displayedCandidate=null;
      displayedInList=null;
      serialLabel.className="searching";
      serialLabel.textContent="Buscando…";
      result.style.display="none";
      resetPending();
      nonBCount=0;

      NEED_SAME=2;
      startDots();
      scanLoop();

    }catch(e){
      statusEl.textContent="❌ Error iniciando: "+(e?.message||e);
      stopAll();
    }
  }

  function stopAll(){
    running=false; stopDots();
    try{ stream?.getTracks?.().forEach(t=>t.stop()); }catch(_){}
    stream=null; video.srcObject=null;

    video.style.display="none";
    roi.style.display="none";
    serialLabel.style.display="none";
    result.style.display="none";
    topBar.style.display="none";
    powerBottom.style.display="none";
    screenStart.classList.remove("hidden");

    displayedCandidate=null; displayedInList=null;
    serialLabel.textContent="—"; serialLabel.className="";
    resetPending(); nonBCount=0;
  }

  function newScan(){
    // feedback
    navigator.vibrate?.(40);

    displayedCandidate=null; displayedInList=null;
    serialLabel.className="searching";
    serialLabel.textContent="Buscando…";
    result.style.display="none";
    resetPending();
    nonBCount=0;
    NEED_SAME=2;
    startDots();
  }

  async function scanLoop(){
    if(!running) return;
    setTimeout(scanLoop, OCR_INTERVAL);
    if(busy) return;
    if(!video.videoWidth || !video.videoHeight) return;

    busy=true;
    try{
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video,0,0);

      const vb = video.getBoundingClientRect();
      const rb = roi.getBoundingClientRect();
      const sx = video.videoWidth / vb.width;
      const sy = video.videoHeight / vb.height;

      let x = Math.floor((rb.left - vb.left)*sx);
      let y = Math.floor((rb.top - vb.top)*sy);
      let w = Math.floor(rb.width*sx);
      let h = Math.floor(rb.height*sy);

      x = Math.max(0, Math.min(x, video.videoWidth-1));
      y = Math.max(0, Math.min(y, video.videoHeight-1));
      w = Math.max(1, Math.min(w, video.videoWidth-x));
      h = Math.max(1, Math.min(h, video.videoHeight-y));

      // recorte interno (quita bordes distractores)
      const padX = Math.floor(w * 0.06);
      const padY = Math.floor(h * 0.18);
      x += padX; y += padY;
      w -= padX*2; h -= padY*2;
      if(w < 20 || h < 20) return;

      const crop = frameCtx.getImageData(x,y,w,h);

      const scale = 2.2;
      cropCanvas.width = Math.floor(w*scale);
      cropCanvas.height = Math.floor(h*scale);

      const tmp = document.createElement("canvas");
      tmp.width=w; tmp.height=h;
      tmp.getContext("2d").putImageData(preprocess(crop),0,0);
      cropCtx.imageSmoothingEnabled=false;
      cropCtx.drawImage(tmp,0,0,cropCanvas.width,cropCanvas.height);

      const { data } = await worker.recognize(cropCanvas);
      const parsed = parseSerial(data?.text||"");

      if(parsed.status==="none"){
        return;
      }

      if(parsed.letter !== "B"){
        nonBCount++;
        if(nonBCount >= NONB_NEED && !displayedCandidate){
          stopDots();
          serialLabel.className="warn";
          serialLabel.textContent="Serie no reconocida";
        }
        return;
      }

      nonBCount=0;

      const candidate = `${parsed.num} B`;
      const confirmed = feedCandidate(candidate);
      if(!confirmed) return;

      displayedCandidate = candidate;
      serialLabel.className="";
      serialLabel.textContent=displayedCandidate;
      stopDots();

      displayedInList = inRangesForCut_B(selectedCut, Number(parsed.num));
      showDecision(displayedInList);

      NEED_SAME = NEED_SAME_AFTER_FIRST;
      resetPending();

      if(displayedInList){ navigator.vibrate?.(120); }

    } finally {
      busy=false;
    }
  }

  // Eventos
  startBtn.addEventListener("click", startCamera);
  powerBtn.addEventListener("click", stopAll);
  newBtn.addEventListener("click", newScan);

  // Estado inicial UI: marcar corte guardado si existe
  if(selectedCut){
    setCut(selectedCut);
  }
  applyRoiPreset(roiPreset);

  // Auto-intento de iniciar cámara (si el browser lo permite)
  // - si ya hay corte elegido
  // - y si el usuario ya dio permisos antes
  async function autoStartIfPossible(){
    if(!selectedCut) return;
    if(!navigator.mediaDevices?.getUserMedia) return;
    try{
      // En iOS a veces esto falla sin “gesture”. Igual intentamos.
      await startCamera();
    }catch(_){}
  }

  // intenta al cargar
  window.addEventListener("load", ()=> {
    // si quieres desactivar autoStart: comenta la línea de abajo
    autoStartIfPossible();
  });

  // intenta al volver a la pestaña
  document.addEventListener("visibilitychange", ()=>{
    if(document.visibilityState === "visible"){
      // si estaba apagada, intentamos reactivar (best-effort)
      if(!running){
        autoStartIfPossible();
      }
    }
  });
</script>
</body>
</html>
