<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Serial Scanner</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:system-ui;
  overflow:hidden;
}

#wrap{
  position:relative;
  width:100vw;
  height:100vh;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
  display:none;
}

/* Marco */
#roi{
  position:absolute;
  top:8%;
  right:5%;
  width:72%;
  height:14%;
  border:4px solid #19ff5a;
  border-radius:18px;
  box-shadow:0 0 0 9999px rgba(0,0,0,.35);
  pointer-events:none;
  display:none;
}

/* Número detectado */
#serial{
  position:absolute;
  top:calc(8% + 14% + 15px);
  right:5%;
  width:72%;
  text-align:center;
  font-size:22px;
  font-weight:900;
  font-family:monospace;
  display:none;
}

/* Resultado central */
#result{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:150px;
  font-weight:900;
  display:none;
}

.ok{ color:#19ff5a; }
.bad{ color:#ff3b30; }

/* Botones */
#controls{
  position:absolute;
  bottom:40px;
  width:100%;
  text-align:center;
}

button{
  font-size:22px;
  padding:18px 28px;
  border-radius:20px;
  border:none;
  font-weight:900;
  margin:10px;
}

#startBtn{
  background:#19ff5a;
  color:#000;
}

#stopBtn{
  background:#ff3b30;
  color:#fff;
  display:none;
}

#status{
  position:absolute;
  bottom:10px;
  left:10px;
  right:10px;
  font-size:13px;
  opacity:.7;
  white-space:pre-wrap;
}
</style>
</head>

<body>
<div id="wrap">

  <video id="video" playsinline muted></video>
  <div id="roi"></div>
  <div id="serial">—</div>
  <div id="result"></div>

  <div id="controls">
    <button id="startBtn">INICIAR CÁMARA</button>
    <button id="stopBtn">CERRAR</button>
  </div>

  <div id="status"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
const video = document.getElementById("video");
const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const roi = document.getElementById("roi");
const serialLabel = document.getElementById("serial");
const result = document.getElementById("result");
const statusEl = document.getElementById("status");

video.autoplay = true;
video.muted = true;
video.setAttribute("playsinline","");

let worker;
let stream;
let running=false;
let busy=false;
let freezeUntil=0;
let rangesData={};

fetch("ranges.json?v="+Date.now())
  .then(r=>r.json())
  .then(d=>{
    rangesData=d;
    for(const k in rangesData){
      rangesData[k].sort((a,b)=>a.start-b.start);
    }
  });

function inRanges(letter, num){
  const list = rangesData[letter];
  if(!list) return false;

  for(const r of list){
    if(num >= r.start && num <= r.end) return true;
  }
  return false;
}

function extract(text){
  const t=text.toUpperCase()
    .replace(/[^\dA-Z ]/g," ")
    .replace(/\s+/g," ")
    .trim();
  const m=t.match(/(\d{9})\s*([A-Z])/);
  if(!m) return null;
  return {num:m[1],letter:m[2]};
}

async function startCamera(){
  try{
    worker=await Tesseract.createWorker("eng");
    await worker.setParameters({
      tessedit_char_whitelist:"0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ"
    });

    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:"environment"},
      audio:false
    });

    video.srcObject=stream;
    await video.play();

    video.style.display="block";
    roi.style.display="block";
    serialLabel.style.display="block";
    stopBtn.style.display="inline-block";
    startBtn.style.display="none";

    running=true;
    scanLoop();
  }
  catch(e){
    statusEl.textContent="Error cámara: "+e.message;
  }
}

function stopCamera(){
  running=false;
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
  video.style.display="none";
  roi.style.display="none";
  serialLabel.style.display="none";
  result.style.display="none";
  stopBtn.style.display="none";
  startBtn.style.display="inline-block";
}

const frameCanvas=document.createElement("canvas");
const frameCtx=frameCanvas.getContext("2d",{willReadFrequently:true});
const cropCanvas=document.createElement("canvas");
const cropCtx=cropCanvas.getContext("2d",{willReadFrequently:true});

function preprocess(img){
  const d=img.data;
  for(let i=0;i<d.length;i+=4){
    let y=(d[i]*.299+d[i+1]*.587+d[i+2]*.114);
    y=(y-128)*1.4+128;
    const v=y>135?255:0;
    d[i]=d[i+1]=d[i+2]=v;
  }
  return img;
}

async function scanLoop(){
  if(!running) return;
  setTimeout(scanLoop,600);

  if(busy || Date.now()<freezeUntil) return;
  if(!video.videoWidth) return;

  busy=true;

  frameCanvas.width=video.videoWidth;
  frameCanvas.height=video.videoHeight;
  frameCtx.drawImage(video,0,0);

  const vb=video.getBoundingClientRect();
  const rb=roi.getBoundingClientRect();
  const sx=video.videoWidth/vb.width;
  const sy=video.videoHeight/vb.height;

  const x=(rb.left-vb.left)*sx;
  const y=(rb.top-vb.top)*sy;
  const w=rb.width*sx;
  const h=rb.height*sy;

  const crop=frameCtx.getImageData(x,y,w,h);
  cropCanvas.width=w;
  cropCanvas.height=h;
  cropCtx.putImageData(preprocess(crop),0,0);

  const {data}=await worker.recognize(cropCanvas);
  const serial=extract(data.text||"");

  if(!serial){
    result.style.display="none";
    serialLabel.textContent="—";
    busy=false;
    return;
  }

  serialLabel.textContent=`${serial.num} ${serial.letter}`;

  if(serial.letter!=="B"){
    result.style.display="none";
    busy=false;
    return;
  }

  const ok=inRanges("B",Number(serial.num));

  result.style.display="block";
  result.className= ok ? "ok" : "bad";
  result.textContent= ok ? "✓" : "✕";

  if(ok){
    navigator.vibrate?.(200);
    freezeUntil=Date.now()+1500;
  }

  busy=false;
}

startBtn.onclick=startCamera;
stopBtn.onclick=stopCamera;
</script>
</body>
</html>
