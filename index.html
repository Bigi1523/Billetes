<!doctype html>
<html lang="es">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta charset="utf-8" />
  <link rel="manifest" href="manifest.json">
  <title>Serial Scanner</title>
  <style>
    body { margin:0; background:#000; color:#fff; font-family: system-ui; }
    #wrap { position: relative; width:100vw; height:100vh; overflow:hidden; }
    video { width:100%; height:100%; object-fit: cover; background:#000; }
    #roiBox{
      position:absolute; top: 7%; right: 5%;
      width: 72%; max-width: 420px;
      height: 14%; max-height: 110px;
      border: 3px solid rgba(0,255,0,.95);
      border-radius: 16px;
      box-shadow: 0 0 0 9999px rgba(0,0,0,.30);
      pointer-events:none;
    }
    #hud{
      position:absolute; left:12px; right:12px; bottom:12px;
      background:rgba(0,0,0,.65);
      padding:10px 12px; border-radius:14px;
    }
    button{
      padding:10px 12px; border-radius:12px; border:0;
      font-weight:800;
    }
    #status{
      margin-top:8px;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 14px;
      line-height: 1.25;
    }
    #row { display:flex; gap:10px; align-items:center; }
    #pill{
      display:inline-block; padding:6px 10px; border-radius:999px;
      background: rgba(255,255,255,.10);
      font-size: 12px;
    }
  </style>
</head>
<body>
<div id="wrap">
  <video id="video" autoplay playsinline muted></video>
  <div id="roiBox"></div>

  <div id="hud">
    <div id="row">
      <button id="startBtn">Iniciar cámara</button>
      <span id="pill">OCR: 600ms</span>
    </div>
    <div id="status">Cargando…</div>
  </div>
</div>

<!-- Tesseract (no module) -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
  const statusEl = document.getElementById("status");
  const pill = document.getElementById("pill");

  // Mostrar errores en pantalla (clave para no “pantalla blanca”)
  window.addEventListener("error", (e) => {
    statusEl.textContent = "❌ Error JS:\n" + (e.message || e.type) + "\n" + (e.filename || "") + ":" + (e.lineno || "");
  });
  window.addEventListener("unhandledrejection", (e) => {
    statusEl.textContent = "❌ Promise error:\n" + (e.reason?.message || String(e.reason));
  });

  // ⚠️ Para evitar cache de SW mientras pruebas, comenta estas líneas:
  // if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");

  statusEl.textContent = "Listo. Toca 'Iniciar cámara'.";

  const video = document.getElementById("video");
  const roiBox = document.getElementById("roiBox");
  const startBtn = document.getElementById("startBtn");

  video.setAttribute("playsinline", "");
  video.muted = true;
  video.autoplay = true;

  let rangesData = {};
  fetch("ranges.json?v=" + Date.now(), { cache: "no-store" })
    .then(r => r.json())
    .then(d => {
      rangesData = d || {};
      for (const k of Object.keys(rangesData)) {
        rangesData[k] = (rangesData[k] || []).slice().sort((a,b)=>a.start-b.start);
      }
    })
    .catch(e => statusEl.textContent = "No pude cargar ranges.json: " + e);

  function inRanges(letter, number) {
    const list = rangesData[letter];
    if (!list || !list.length) return false;
    let lo=0, hi=list.length-1;
    while (lo<=hi) {
      const mid=(lo+hi)>>1;
      const r=list[mid];
      if (number < r.start) hi=mid-1;
      else if (number > r.end) lo=mid+1;
      else return true;
    }
    return false;
  }

  function extractSerial(text) {
    const t = (text || "").toUpperCase()
      .replace(/[^\dA-Z ]/g, " ")
      .replace(/\s+/g, " ")
      .trim();
    const m = t.match(/(\d{9})\s*([A-Z])/);
    if (!m) return null;
    return { numberStr: m[1], letter: m[2], cleaned: t };
  }

  const frameCanvas = document.createElement("canvas");
  const frameCtx = frameCanvas.getContext("2d", { willReadFrequently: true });
  const cropCanvas = document.createElement("canvas");
  const cropCtx = cropCanvas.getContext("2d", { willReadFrequently: true });

  function preprocessToBW(imgData) {
    const d = imgData.data;
    for (let i=0; i<d.length; i+=4) {
      const r=d[i], g=d[i+1], b=d[i+2];
      let y = (r*0.299 + g*0.587 + b*0.114);
      y = (y - 128) * 1.35 + 128;
      const v = y > 140 ? 255 : 0;
      d[i]=d[i+1]=d[i+2]=v; d[i+3]=255;
    }
    return imgData;
  }

  let worker = null;
  async function initWorker() {
    if (worker) return worker;
    statusEl.textContent = "Cargando OCR…";
    worker = await Tesseract.createWorker("eng");
    await worker.setParameters({
      tessedit_char_whitelist: "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    });
    statusEl.textContent = "OCR listo. Toca 'Iniciar cámara'.";
    return worker;
  }

  let running=false, busy=false, freezeUntil=0;
  let OCR_INTERVAL = 600;
  pill.textContent = `OCR: ${OCR_INTERVAL}ms`;

  async function startCamera() {
    statusEl.textContent = "Solicitando cámara…";
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal:"environment" }, width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
    } catch(e1) {
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video:true, audio:false });
      } catch(e2) {
        statusEl.textContent = "❌ Cámara bloqueada.\n" + (e2.name||e2) + " - " + (e2.message||"") +
          "\nSolución: Ajustes > Safari > Cámara = Permitir, y recargar.";
        throw e2;
      }
    }

    video.srcObject = stream;
    await new Promise(res => video.onloadedmetadata = res);
    await video.play();

    statusEl.textContent = "✅ Cámara activa. Alinea el serial dentro del rectángulo.";
  }

  async function loop() {
    if (!running) return;
    setTimeout(loop, OCR_INTERVAL);

    if (Date.now() < freezeUntil) return;
    if (busy) return;
    if (!video.videoWidth || !video.videoHeight) return;

    busy=true;
    try {
      frameCanvas.width = video.videoWidth;
      frameCanvas.height = video.videoHeight;
      frameCtx.drawImage(video, 0, 0);

      const vb = video.getBoundingClientRect();
      const rb = roiBox.getBoundingClientRect();
      const scaleX = video.videoWidth / vb.width;
      const scaleY = video.videoHeight / vb.height;

      let x = Math.floor((rb.left - vb.left) * scaleX);
      let y = Math.floor((rb.top - vb.top) * scaleY);
      let w = Math.floor(rb.width * scaleX);
      let h = Math.floor(rb.height * scaleY);

      x = Math.max(0, Math.min(x, video.videoWidth - 1));
      y = Math.max(0, Math.min(y, video.videoHeight - 1));
      w = Math.max(1, Math.min(w, video.videoWidth - x));
      h = Math.max(1, Math.min(h, video.videoHeight - y));

      const crop = frameCtx.getImageData(x,y,w,h);
      cropCanvas.width = w; cropCanvas.height = h;
      cropCtx.putImageData(preprocessToBW(crop), 0, 0);

      const { data } = await worker.recognize(cropCanvas);
      const raw = (data && data.text) ? data.text : "";
      const serial = extractSerial(raw);

      if (!serial) {
        statusEl.textContent = "No detectado.\nOCR: " + raw.trim();
        return;
      }
      if (serial.letter !== "B") {
        statusEl.textContent = `Detectado: ${serial.numberStr} ${serial.letter} → descartado\nOCR: ${serial.cleaned}`;
        return;
      }
      const n = Number(serial.numberStr);
      const ok = inRanges("B", n);

      if (ok) {
        statusEl.textContent = `✅ ${serial.numberStr} B (EN RANGO)\nOCR: ${serial.cleaned}`;
        if (navigator.vibrate) navigator.vibrate(200);
        freezeUntil = Date.now() + 1500;
      } else {
        statusEl.textContent = `❌ ${serial.numberStr} B (fuera de rango)\nOCR: ${serial.cleaned}`;
      }
    } finally {
      busy=false;
    }
  }

  startBtn.onclick = async () => {
    if (running) return;
    await initWorker();
    await startCamera();
    running = true;
    loop();
  };
</script>
</body>
</html>
